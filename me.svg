<svg width="100%" viewBox="0 0 680 405" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round"></path>
        </marker>
        <linearGradient id="scangrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="transparent"></stop>
            <stop offset="50%" stop-color="#00f5ff"></stop>
            <stop offset="100%" stop-color="transparent"></stop>
        </linearGradient>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&amp;family=Manrope:wght@400;500&amp;display=swap');

            @keyframes blink {

                0%,
                100% {
                    opacity: 1
                }

                50% {
                    opacity: 0
                }
            }

            @keyframes scan {
                0% {
                    transform: translateY(0)
                }

                100% {
                    transform: translateY(440px)
                }
            }

            @keyframes float0 {

                0%,
                100% {
                    transform: translateY(0)
                }

                50% {
                    transform: translateY(-2px)
                }
            }

            @keyframes float1 {

                0%,
                100% {
                    transform: translateY(0)
                }

                50% {
                    transform: translateY(-2px)
                }
            }

            @keyframes float2 {

                0%,
                100% {
                    transform: translateY(0)
                }

                50% {
                    transform: translateY(-2px)
                }
            }

            @keyframes float3 {

                0%,
                100% {
                    transform: translateY(0)
                }

                50% {
                    transform: translateY(-2px)
                }
            }

            @keyframes pulse {

                0%,
                100% {
                    opacity: 0.7
                }

                50% {
                    opacity: 0.3
                }
            }

            .cursor {
                animation: blink 1s step-end infinite;
            }

            .scan-line {
                animation: scan 4s linear infinite;
            }

            .b0 {
                animation: float0 3s ease-in-out infinite;
                animation-delay: 0.2s;
            }

            .b1 {
                animation: float1 3s ease-in-out infinite;
                animation-delay: 0.4s;
            }

            .b2 {
                animation: float2 3s ease-in-out infinite;
                animation-delay: 0.6s;
            }

            .b3 {
                animation: float3 3s ease-in-out infinite;
                animation-delay: 0.8s;
            }

            .pulse-dot {
                animation: pulse 2s ease-in-out infinite;
            }
        </style>
    </defs>

